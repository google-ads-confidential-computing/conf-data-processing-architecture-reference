syntax = "proto3";

package google.cmrt.sdk.v1;

// Data encryption key wrapped by a GCP KMS key.
// Next ID: 4
message GcpWrappedKey {
  // The encrypted data encryption key (DEK). The value should already be in the
  // base 64 encoded format.
  bytes encrypted_dek = 1;

  // The KMS URI for the key encryption key (KEK) protecting the encrypted DEK.
  string kek_uri = 2;

  // The resource name of the Workload Identity Pool (WIP) provider.
  string wip_provider = 3;
}

// Data encryption key wrapped by an AWS KMS key.
// Next ID: 4
message AwsWrappedKey {
  // The encrypted data encryption key (DEK). The value should already be in the
  // base 64 encoded format.
  bytes encrypted_dek = 1;

  // The KMS URI for the key encryption key (KEK) protecting the encrypted DEK.
  string kek_uri = 2;

  // The ARN of the IAM Role to assume for KMS decryption access.
  string role_arn = 3;
}

// A wrapper for cloud-specific wrapped keys.
// Next ID: 3
message CloudWrappedKey {
  oneof key {
    GcpWrappedKey gcp_wrapped_key = 1;
    AwsWrappedKey aws_wrapped_key = 2;
  }
}
