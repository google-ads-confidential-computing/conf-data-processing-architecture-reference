syntax = "proto3";

package google.cmrt.sdk.v1;

import "google/protobuf/duration.proto";

option java_multiple_files = true;

// Next ID: 2
message EncryptionKeyPrefetchConfig {
  // Next ID: 4
  message KeysetPrefetchConfig {
    string key_namespace = 1;
    // The prefetch config accepts the union of
    // key_ids and prefetch_duration.
    repeated string key_ids = 2;
    // prefetch_duration represents the past duration,
    // it prefetches one week in the future.
    google.protobuf.Duration prefetch_duration = 3;
  }

  repeated KeysetPrefetchConfig keyset_prefetch_configs = 1;
}
