syntax = "proto3";

import "cc/public/cpio/proto/private_key_service/v1/private_key_service.proto";

package google.cmrt.sdk.v1;

// For faster allocations of sub-messages.
option cc_enable_arenas = true;

// Next ID: 3
message KeyCoordinatorConfiguration {
  // The endpoints to fetch keys from.
  repeated private_key_service.v1.PrivateKeyEndpoint private_key_endpoints = 1;
  // The namespace of the keys to fetch.
  repeated string key_namespace = 2;
}
